<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certification Display</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #966fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 2rem;
        }

        .certificate-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin: 2rem 0;
            position: relative;
            overflow: hidden;
        }

        .certificate-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #4F46E5, #10B981);
        }

        .certificate-title {
            text-align: center;
            margin-bottom: 2rem;
            color: #1F2937;
            font-size: 2.2rem;
            font-weight: 700;
        }

        .certificate-image {
            width: 100%;
            border: 15px solid #fff;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            cursor: zoom-in;
            background: #fff;
        }

        .certificate-image:hover {
            transform: scale(1.02);
        }

        .certificate-info {
            text-align: center;
            margin-top: 1.5rem;
            color: #6B7280;
            font-size: 0.95rem;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            padding: 12px 24px;
            background: linear-gradient(45deg, #4F46E5, #6366F1);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: 600;
            margin-top: 2rem;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3);
        }

        .back-button i {
            margin-right: 8px;
        }
        .certificate-image:active {
            transform: scale(1.8);
            transition: transform 0.3s ease;
            z-index: 10;
            cursor: zoom-out;
        }

        @media (max-width: 768px) {
            .certificate-container {
                padding: 1.5rem;
            }
            
            .certificate-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="certificate-container">
        <h1 class="certificate-title">Academic Achievement</h1>
        <div class="certificate-image-container">
            <img 
                src="bdg.jpeg" 
                alt="Certification of Achievement" 
                class="certificate-image"
            >
        </div>
        <p class="certificate-info">
            Awarded for 1st Place in Bizerte Algorithm and Programming BAC exam • Score: 19.83/20 • Date: 02/08/2024
        </p>
    </div>

    <a href="BacMaster.html" class="back-button">
        <i class="fas fa-arrow-left"></i>
        Back to Profile
    </a>
</body>
</html>
